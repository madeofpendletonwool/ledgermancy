# Production overlay. Use alongside the base file:
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Differences from local development:
#   - Postgres publishes no host ports at all. It is reachable only from the
#     api and worker over the internal compose network.
#   - The api publishes no host port at all. The frontend container reaches it
#     over the compose network (api:8080); an outer TLS-terminating reverse
#     proxy forwards to the published frontend port instead.

# The !override tags below are required, not stylistic. Compose MERGES list
# fields such as `ports` across files, so a plain `ports: []` is a no-op and a
# plain replacement would leave the base file's 0.0.0.0 binding in place
# alongside the new one. !override discards the base value instead.

services:
  postgres:
    # No host mapping at all: the database is reachable only from the api and
    # worker over the compose network. For a shell, use:
    #   docker compose exec postgres psql -U ledgermancy -d ledgermancy
    ports: !override []

  api:
    environment:
      APP_ENV: production
      # Honour X-Forwarded-For / X-Forwarded-Proto from the frontend container.
      #
      # This is safe here and ONLY here. Two things have to be true before
      # forwarded headers can be trusted, and both hold under this overlay:
      #
      #   1. nginx overwrites them. See frontend/nginx.conf — it clears
      #      True-Client-IP and sets X-Forwarded-For to $remote_addr rather
      #      than appending, so a client-supplied value never survives.
      #   2. Nothing can bypass nginx. The `ports: !override []` below removes
      #      the api's host port entirely, so the frontend container is the
      #      only thing that can reach it.
      #
      # It is deliberately absent from the base compose file, where the api
      # still publishes a loopback port for the vite dev server and requests
      # can therefore arrive without passing through nginx at all.
      #
      # Without this the api sees nginx's container address as every caller's
      # IP, which collapses per-client rate limiting into one shared bucket
      # and makes the audit log's client_ip useless.
      TRUST_PROXY_HEADERS: "true"
    # No host port at all. The frontend container is the only thing that talks
    # to the api, and it does so over the compose network at api:8080. Nothing
    # needs to reach the api from the host, so it is fully unpublished.
    ports: !override []

  worker:
    environment:
      APP_ENV: production
