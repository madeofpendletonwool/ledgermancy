# Serves the built SPA and proxies the API paths to the api container. This is
# the only publicly published service in production; the api has no host port
# and is reached only here, over the compose network at api:8080.

# Preserve the caller's scheme when we sit behind another TLS-terminating proxy
# (which sends X-Forwarded-Proto), but fall back to our own scheme when we are
# the edge (e.g. local testing).
map $http_x_forwarded_proto $forwarded_proto {
    default $scheme;
    "~.+"   $http_x_forwarded_proto;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # HSTS only when the request actually arrived over TLS. Sending it on plain
    # HTTP would lock a developer out of their local http:// setup for two
    # years, which no browser would let them clear. An empty value makes nginx
    # skip the header entirely.
    set $hsts "";
    if ($forwarded_proto = "https") {
        set $hsts "max-age=63072000; includeSubDomains";
    }

    # NOTE ON WHERE SECURITY HEADERS LIVE
    #
    # They are set per-location below, not here at server level, and that is
    # deliberate. nginx's add_header is not additive across levels: a location
    # containing any add_header ignores every server-level one. More to the
    # point, the api sets its own headers on /api responses — a server-level
    # block here would arrive on top of those and produce duplicates like
    # "X-Frame-Options: DENY, DENY", which some browsers discard as malformed.
    #
    # So: nginx owns the headers on what nginx serves (the SPA), and the api
    # owns the headers on what the api serves. Exactly one set each.

    # CSV imports and other uploads post through /api; the default 1m is too low.
    client_max_body_size 25m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Docker's embedded DNS. Resolving the api name at request time (rather than
    # once at startup) means a recreated api container with a new IP is picked
    # up without restarting nginx.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # WHO COUNTS AS THE CLIENT
    #
    # Generated from $TRUSTED_PROXIES at container start (see
    # docker-entrypoint.d/25-trusted-proxies.sh). Empty unless the operator
    # names addresses, and when it is empty nginx behaves as if this include
    # were not here.
    #
    # This matters when something else terminates TLS and forwards to us, which
    # is the documented production topology. In that case the connection always
    # arrives from the same address — that proxy — and without this every
    # caller in the world resolves to a single IP. The api's rate limits are
    # keyed on that value, so they would collapse into one shared bucket: one
    # bot probing /api/auth/login would exhaust the login limit for the whole
    # household, and every audit record would name the proxy instead of a user.
    #
    # Naming the proxy here makes $remote_addr the real client for connections
    # *from that proxy only*. It is not a blanket "trust X-Forwarded-For":
    # anything reaching this container directly still gets its true peer
    # address no matter what headers it sends, which is what keeps the
    # published port from being a spoofing hole.
    include /etc/nginx/trusted-proxies.conf;

    # Client-address headers. These are what the api's rate limiting and audit
    # log key on, so they must describe who actually connected — not what the
    # caller claimed.
    #
    #   True-Client-IP  cleared outright. chi's RealIP middleware checks it
    #                   FIRST, so leaving a client-supplied value in place would
    #                   let anyone choose their own apparent address and walk
    #                   straight past every per-IP limit.
    #   X-Forwarded-For set to $remote_addr, NOT $proxy_add_x_forwarded_for.
    #                   The latter *appends* to whatever the client sent, so a
    #                   forged first entry survives and is the one RealIP reads.
    #                   $remote_addr is the address nginx itself resolved —
    #                   either the peer, or the client extracted from a trusted
    #                   proxy's header by the include above. Never a raw
    #                   client-supplied value.
    #
    # Do not "restore" either of these without also re-checking that story.
    location /api/ {
        set $upstream_api api;
        proxy_pass http://$upstream_api:8080;
        proxy_set_header Host $host;
        proxy_set_header True-Client-IP "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    # Plaid posts here from the public internet (via the outer TLS proxy).
    location /webhooks/ {
        set $upstream_api api;
        proxy_pass http://$upstream_api:8080;
        proxy_set_header Host $host;
        proxy_set_header True-Client-IP "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    location = /healthz {
        set $upstream_api api;
        proxy_pass http://$upstream_api:8080;
        proxy_set_header Host $host;
        proxy_set_header True-Client-IP "";
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    # Client-side routing: deep links like /net-worth must return the app shell.
    #
    # This is the only location that serves an HTML document, so it is the only
    # one where a Content-Security-Policy means anything — CSP governs how a
    # document loads subresources, and the JSON and CSV the api returns are not
    # documents.
    location / {
        try_files $uri /index.html;

        # The plaid.com entries are load-bearing and must not be "tidied" away.
        # react-plaid-link injects a script from cdn.plaid.com at runtime,
        # opens its widget in an iframe, calls the Plaid API from inside it,
        # and renders institution logos — so script-src, frame-src, connect-src
        # and img-src all need it. Tightening any of them silently breaks
        # account linking, and it breaks it at the moment a user is halfway
        # through handing over bank credentials. These values follow Plaid's
        # own published CSP guidance; the wildcard is theirs, not laziness.
        #
        # 'unsafe-inline' appears on style-src only, because React style={}
        # props and Plaid's injected iframe both need it. It is deliberately
        # absent from script-src, which is where it would actually matter —
        # and the built bundle has no inline <script>, so it is not needed.
        #
        # img-src also allows data: for the two-factor QR code, which the api
        # renders server-side and returns as an inline PNG.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.plaid.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.plaid.com; font-src 'self'; connect-src 'self' https://*.plaid.com; frame-src 'self' https://*.plaid.com; frame-ancestors 'none'; base-uri 'none'; form-action 'self'; object-src 'none'" always;

        # `always` matters throughout: without it nginx omits these on error
        # responses, which are exactly the pages worth leaving unprotected least.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), usb=()" always;
        add_header Strict-Transport-Security $hsts always;
    }
}
